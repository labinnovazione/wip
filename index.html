<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasquale Caiazzo | In Evoluzione</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,500;1,300&display=swap');

        :root {
            --accent-yellow: #f8e71c;
            --accent-salmon: #ff4d4d;
            --text-main: #1a1a1a;
            --text-muted: #999;
            --bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 60px;
        }

        .main-text {
            font-size: clamp(1.4rem, 4vw, 1.7rem);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 50px;
            text-align: center;
        }

        .main-text i {
            color: var(--text-muted);
        }

        /* L'highlight giallo come unico accento di carattere */
        .highlight {
            position: relative;
            display: inline-block;
            font-weight: 500;
        }

        .highlight::after {
            content: "";
            position: absolute;
            bottom: 3px;
            left: 0;
            width: 100%;
            height: 35%;
            background-color: var(--accent-yellow);
            z-index: -1;
            opacity: 0.7;
        }

        /* La citazione LinkedIn come elemento di equilibrio */
        .faith-note {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 80px;
            font-weight: 300;
        }

        .faith-note span {
            color: var(--accent-salmon);
            font-weight: bold;
            margin-right: 6px;
        }

        /* Il caricamento: armonioso, non invasivo */
        .loader-container {
            width: 180px;
            text-align: center;
        }

        .loader-bar {
            width: 100%;
            height: 2px;
            background-color: #f0f0f0;
            position: relative;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            width: 40%;
            background-color: var(--accent-yellow);
            animation: moveLoader 3s ease-in-out infinite;
        }

        @keyframes moveLoader {
            0% { left: -40%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .loader-text {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ccc;
        }

        .footer-domain {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-main);
            text-decoration: none;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .footer-domain:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <span class="status-label">Work in Progress</span>

        <div class="main-text">
            Al lavoro per dare una nuova forma a questo spazio. <br>
            <i>E onestamente,</i> <span class="highlight">era anche ora.</span>
        </div>

        <div class="faith-note">
            <span>//</span> Meglio tardi che mai.
        </div>

        <!-- Gerarchia visiva: il caricamento chiude il blocco informativo -->
        <div class="loader-container">
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
            <div class="loader-text">Aggiornamento in corso</div>
        </div>

        <a href="/" class="footer-domain">pasqualecaiazzo.com</a>
    </div>

</body>
</html>
