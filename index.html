<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Readability Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070F;--surface:#0D0D1C;--surface2:#111120;
  --border:#1C1C30;--border2:#252540;
  --gold:#C9A84C;--gold-l:#E5C96A;
  --teal:#2DB885;--amber:#D4870E;--coral:#D84F35;
  --text:#EDE8DF;--muted:#8080A0;--dim:#2E2E4A;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:0 1rem}
.wrap{max-width:820px;margin:0 auto;padding:3rem 0 5rem}
.header{text-align:center;padding:0 0 2.5rem;border-bottom:1px solid var(--border);margin-bottom:2.5rem}
.eyebrow{font-size:.6rem;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;display:block}
.header h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;line-height:1.15;margin-bottom:.75rem}
.header h1 em{font-style:italic;color:var(--gold)}
.header p{font-size:.78rem;color:var(--muted);line-height:1.8;max-width:460px;margin:0 auto}
.key-bar{background:var(--surface);border:1px solid var(--border);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.key-label{font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;flex-shrink:0}
.input-section{background:var(--surface);border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.field-label{display:block;font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.75rem}
.input-row{display:flex;gap:.75rem}
.url-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;padding:.85rem 1rem;outline:none;transition:border-color .2s}
.url-input:focus{border-color:var(--gold)}
.url-input::placeholder{color:var(--dim)}
.btn-analyze{background:var(--gold);color:var(--bg);border:none;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:.85rem 1.4rem;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-analyze:hover{background:var(--gold-l)}
.btn-analyze:disabled{background:var(--dim);cursor:not-allowed}
.error-box{display:none;background:rgba(216,79,53,.08);border:1px solid rgba(216,79,53,.3);color:var(--coral);padding:.75rem 1rem;font-size:.72rem;margin-top:.75rem;line-height:1.6}
.loading{display:none;padding:3rem 1rem}
.spinner{width:38px;height:38px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.steps{max-width:260px;margin:0 auto}
.step-line{font-size:.65rem;color:var(--dim);letter-spacing:.05em;padding:.3rem 0;transition:color .3s}
.step-line.active{color:var(--text);animation:fade 1.5s ease-in-out infinite}
.step-line.done{color:var(--teal)}
@keyframes fade{0%,100%{opacity:1}50%{opacity:.35}}
.results{display:none;animation:slideIn .5s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.score-hero{background:var(--surface);border:1px solid var(--border);padding:1.75rem 2rem;display:flex;align-items:center;gap:2rem;margin-bottom:1rem}
.ring-wrap{position:relative;flex-shrink:0;width:100px;height:100px}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;display:block;line-height:1}
.ring-sub{font-size:.55rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;display:block;margin-top:2px}
.hero-info .tipo{display:inline-block;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.4);padding:.2rem .55rem;margin-bottom:.6rem}
.hero-info h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.hero-info .sintesi{font-size:.78rem;color:var(--muted);line-height:1.8}
.data-bar{background:var(--surface2);border:1px solid var(--border);padding:.75rem 1.25rem;margin-bottom:1rem;font-size:.62rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.dtag{background:var(--surface);border:1px solid var(--border2);padding:.15rem .5rem;font-size:.6rem}
.dtag.yes{border-color:rgba(45,184,133,.4);color:var(--teal)}
.dtag.no{border-color:rgba(216,79,53,.25);color:var(--coral);opacity:.6}
.dtag.warn{border-color:rgba(212,135,14,.4);color:var(--amber)}
.dims-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:1rem}
.dim-card{background:var(--surface);padding:1.25rem 1.5rem}
.dim-card:nth-child(5){grid-column:span 2}
.dim-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem}
.dim-name{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);max-width:120px;line-height:1.4}
.dim-score-n{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700}
.bar-bg{height:2px;background:var(--border2);margin-bottom:.85rem;overflow:hidden}
.bar-fill{height:100%;width:0%;transition:width 1.3s cubic-bezier(.22,1,.36,1)}
.dim-sintesi{font-size:.73rem;color:var(--text);line-height:1.65;margin-bottom:.35rem}
.dim-gap{font-size:.68rem;color:var(--muted);line-height:1.5}
.dim-gap::before{content:"↳ ";color:var(--coral);opacity:.8}
.bottom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:1rem}
.bottom-card{background:var(--surface2);padding:1.25rem 1.5rem}
.bottom-title{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.9rem}
.b-item{font-size:.7rem;color:var(--text);line-height:1.6;padding:.38rem 0;border-bottom:1px solid var(--border);display:flex;gap:.5rem;align-items:flex-start}
.b-item:last-child{border-bottom:none}
.b-icon{flex-shrink:0;font-size:.6rem;margin-top:.15rem}
.step-item{padding:.38rem 0;border-bottom:1px solid var(--border)}
.step-item:last-child{border-bottom:none}
.step-p{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.2rem}
.step-a{font-size:.7rem;color:var(--text);line-height:1.55}
.btn-reset{display:block;width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.9rem;cursor:pointer;transition:all .2s}
.btn-reset:hover{border-color:var(--gold);color:var(--gold)}
.footer{text-align:center;padding:2rem 0 0;font-size:.6rem;color:var(--dim);letter-spacing:.08em;border-top:1px solid var(--border)}
.result-actions{display:flex;align-items:center;gap:1rem;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.btn-pdf{background:var(--gold);color:var(--bg);border:none;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:.85rem 1.4rem;cursor:pointer;transition:background .2s;white-space:nowrap}
.btn-pdf:hover{background:var(--gold-l)}
@media print{
  @page{margin:1.2cm 1.4cm;size:A4}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#0D0D0D!important;color:#EDE8DF!important;font-size:9pt}
  .wrap{max-width:100%!important;padding:0!important}
  .header,.input-section,.loading,.result-actions,.footer,.lang-bar{display:none!important}
  .results{display:block!important}
  .score-hero{background:#161616!important;border:1px solid #2a2a2a!important;padding:12pt 16pt!important;display:flex!important;align-items:center!important;gap:16pt!important;margin-bottom:8pt!important;page-break-inside:avoid}
  .hero-info h2{font-size:16pt!important;color:#EDE8DF!important}
  .hero-info .sintesi{font-size:8pt!important;color:#8A8577!important}
  .ring-num{font-size:22pt!important;color:#C9A84C!important}
  .ring-sub{color:#8A8577!important}
  .hero-info .tipo{color:#C9A84C!important;border-color:rgba(201,168,76,.4)!important}
  .data-bar{background:#1A1A1A!important;border:1px solid #2a2a2a!important;padding:6pt 10pt!important;margin-bottom:8pt!important;page-break-inside:avoid}
  .dtag{border:1px solid #2a2a2a!important;background:#161616!important;color:#8A8577!important;font-size:6.5pt!important;padding:1pt 4pt!important}
  .dtag.yes{border-color:rgba(45,184,133,.5)!important;color:#2DB885!important}
  .dtag.no{border-color:rgba(216,79,53,.3)!important;color:#D84F35!important}
  .dims-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:6pt!important;margin-bottom:8pt}
  .dim-card:nth-child(5){grid-column:span 2!important}
  .dim-card{background:#161616!important;border:1px solid #2a2a2a!important;padding:10pt!important;page-break-inside:avoid}
  .dim-name{font-size:7pt!important;color:#8A8577!important;letter-spacing:.15em}
  .dim-score{font-size:18pt!important;color:#C9A84C!important}
  .dim-bar-fill{background:#C9A84C!important;print-color-adjust:exact}
  .dim-text{font-size:7.5pt!important;color:#EDE8DF!important;line-height:1.6}
  .dim-gap{font-size:7pt!important;color:#8A8577!important}
  .bottom-grid{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:6pt!important}
  .bottom-card{background:#161616!important;border:1px solid #2a2a2a!important;padding:10pt!important;page-break-inside:avoid}
  .bottom-card h3{font-size:7pt!important;color:#8A8577!important;letter-spacing:.15em}
  .step-p{font-size:6pt!important}
  .step-p.alta{color:#C9A84C!important}
  .step-p.media{color:#8A8577!important}
  a{color:#C9A84C!important;text-decoration:none}
}
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:1rem;gap:.25rem}
.lang-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;padding:.3rem .65rem;cursor:pointer;transition:all .2s}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.tone-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.tone-label{font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.tone-btns{display:flex;gap:.35rem}
.tone-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;padding:.3rem .6rem;cursor:pointer;transition:all .2s;position:relative}
.tone-btn:hover{border-color:var(--gold);color:var(--gold)}
.tone-btn.active{border-color:var(--gold);color:var(--bg);background:var(--gold)}
.tone-desc{font-size:.62rem;color:var(--dim);font-style:italic;flex:1;min-width:140px}
@media(max-width:600px){
  .score-hero{flex-direction:column;align-items:flex-start;gap:1.2rem}
  .dims-grid{grid-template-columns:1fr}.dim-card:nth-child(5){grid-column:span 1}
  .bottom-grid{grid-template-columns:1fr}
  .header h1{font-size:1.9rem}
  .input-row{flex-direction:column}.btn-analyze{width:100%}
  .tone-row{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-bar">
    <button id="btnLangIT" class="lang-btn active" onclick="setLang('it')">IT</button>
    <button id="btnLangEN" class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
  <div class="header">
    <span class="eyebrow">Digital Identity Assessment</span>
    <h1 id="i18n-headline"></h1>
    <p id="i18n-subhead"></p>
  </div>
  <div class="input-section" id="inputSection">
    <label class="field-label" id="i18n-fieldLabel" for="urlInput"></label>
    <div class="input-row">
      <input type="url" id="urlInput" class="url-input" />
      <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()"></button>
    </div>
    <div class="tone-row">
      <span class="tone-label" id="i18n-toneLabel"></span>
      <div class="tone-btns">
        <button class="tone-btn" onclick="setTone(1)">1</button>
        <button class="tone-btn" onclick="setTone(2)">2</button>
        <button class="tone-btn active" onclick="setTone(3)">3</button>
        <button class="tone-btn" onclick="setTone(4)">4</button>
        <button class="tone-btn" onclick="setTone(5)">5</button>
      </div>
      <span class="tone-desc" id="toneDesc"></span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>
  <div class="loading" id="loadingSection">
    <div class="spinner" id="loadingSpinner"></div>
    <div class="steps">
      <div id="s1" class="step-line"></div>
      <div id="s2" class="step-line"></div>
      <div id="s3" class="step-line"></div>
      <div id="s4" class="step-line"></div>
    </div>
  </div>
  <div class="results" id="resultsSection">
    <div id="scoreHeroWrap"></div>
    <div id="dataBar"></div>
    <div class="dims-grid" id="dimsGrid"></div>
    <div class="bottom-grid" id="bottomGrid"></div>
    <div class="result-actions">
      <button class="btn-reset" id="i18n-btnReset" onclick="resetTool()"></button>
      <button class="btn-pdf" id="btnPdf" onclick="downloadPdf()"></button>
    </div>
  </div>
  <div class="footer" id="i18n-footer"></div>
</div>
<script>
// ----------------------------------------------------------------------
// 1. CONFIGURAZIONE LINGUE E STATO
// ----------------------------------------------------------------------
let TONE = 3;
let LANG = 'it';

const I18N = {
  it: {
    headline: 'Chi sei<br><em>nell\'era dell\'AI?</em>',
    subhead: 'Analisi reale della struttura della tua presenza digitale — JSON-LD, meta tag, coerenza narrativa, AI-readiness — in 5 dimensioni.',
    fieldLabel: 'URL da analizzare',
    placeholder: 'https://tuosito.com',
    btnAnalyze: 'Analizza →',
    s1: '— Recupero pagina...', s2: '— Estrazione dati strutturati...',
    s3: '— Verifica llms.txt e robots.txt...', s4: '— Analisi AI readability...',
    btnReset: '← Nuova analisi',
    btnPdf: '↓ PDF',
    footer: 'Digital Identity Scanner — powered by Gemini AI',
    errNoUrl: 'Inserisci un URL valido.',
    errInvalidUrl: 'URL non valido. Usa formato: sito.com',
    errApi: 'Errore API',
    errNoJson: 'JSON non trovato nella risposta — vedi Console per dettagli.',
    toneLabel: 'Livello di dettaglio',
    toneLevels: [
      'Imprenditore — solo impatto business',
      'Manager — risultati e opportunità',
      'Consulente — bilanciato',
      'Sviluppatore — termini tecnici',
      'Esperto AI — massimo dettaglio'
    ],
    promptLang: ''
  },
  en: {
    headline: 'Who are you<br><em>in the AI era?</em>',
    subhead: 'Real analysis of your digital presence — JSON-LD, meta tags, narrative coherence, AI-readiness — across 5 dimensions.',
    fieldLabel: 'URL to analyze',
    placeholder: 'https://yoursite.com',
    btnAnalyze: 'Analyze →',
    s1: '— Fetching page...', s2: '— Extracting structured data...',
    s3: '— Checking llms.txt and robots.txt...', s4: '— AI readability analysis...',
    btnReset: '← New analysis',
    btnPdf: '↓ PDF',
    footer: 'Digital Identity Scanner — powered by Gemini AI',
    errNoUrl: 'Please enter a valid URL.',
    errInvalidUrl: 'Invalid URL. Format: site.com',
    errApi: 'API Error',
    errNoJson: 'JSON not found in response — check the Console for details.',
    toneLabel: 'Detail level',
    toneLevels: [
      'Executive — business impact only',
      'Manager — results and opportunities',
      'Consultant — balanced',
      'Developer — technical terms',
      'AI Expert — maximum detail'
    ],
    promptLang: '\n\nIMPORTANT: Respond entirely in ENGLISH. Every text field must be in English.'
  }
};

function t(key) { return I18N[LANG][key] ?? key; }

// ----------------------------------------------------------------------
// 2. FUNZIONI UI (lingua, tono, reset, errori)
// ----------------------------------------------------------------------
function setTone(n) {
  TONE = n;
  document.querySelectorAll('.tone-btn').forEach((b, idx) => b.classList.toggle('active', idx+1 === n));
  document.getElementById('toneDesc').textContent = t('toneLevels')[n-1] || '';
}

function setLang(lang) {
  LANG = lang;
  document.getElementById('btnLangIT').classList.toggle('active', lang === 'it');
  document.getElementById('btnLangEN').classList.toggle('active', lang === 'en');
  renderLang();
}

function renderLang() {
  const ids = {
    'i18n-headline': 'headline', 'i18n-subhead': 'subhead',
    'i18n-fieldLabel': 'fieldLabel', 'i18n-btnReset': 'btnReset', 'i18n-footer': 'footer',
    'i18n-toneLabel': 'toneLabel'
  };
  Object.entries(ids).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = t(key);
  });
  const urlInput = document.getElementById('urlInput');
  if (urlInput) urlInput.placeholder = t('placeholder');
  const btnAnalyze = document.getElementById('btnAnalyze');
  if (btnAnalyze) btnAnalyze.textContent = t('btnAnalyze');
  const btnPdf = document.getElementById('btnPdf');
  if (btnPdf) btnPdf.textContent = t('btnPdf');
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('s'+i);
    if (el) el.textContent = t('s'+i);
  }
  const toneDesc = document.getElementById('toneDesc');
  if (toneDesc) toneDesc.textContent = t('toneLevels')[TONE-1] || '';
}

function showErr(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}
function hideErr() { document.getElementById('errorBox').style.display = 'none'; }

function setStep(n) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('s'+i);
    if (!el) continue;
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  }
}

function clearResults() {
  document.getElementById('scoreHeroWrap').innerHTML = '';
  document.getElementById('dataBar').innerHTML = '';
  document.getElementById('dimsGrid').innerHTML = '';
  document.getElementById('bottomGrid').innerHTML = '';
  const percBox = document.getElementById('percezioneBox');
  if (percBox) percBox.remove();
}

function resetTool() {
  clearResults();
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('inputSection').style.opacity = '1';
  document.getElementById('btnAnalyze').disabled = false;
  document.getElementById('urlInput').value = '';
  hideErr();
}

// ----------------------------------------------------------------------
// 3. CRONOLOGIA DOMINIO (timeout aumentato)
// ----------------------------------------------------------------------
async function checkDomainHistory(url) {
  const domain = new URL(url).hostname;
  const years = [1, 2, 5];
  let historyBonus = 0;
  let found = [];
  const now = new Date();
  const checks = years.map(async (y) => {
    const ts = new Date(now.getFullYear()-y, now.getMonth(), now.getDate()).toISOString().slice(0,10).replace(/-/g,'');
    try {
      const proxyUrl = `/api/fetch-page?url=${encodeURIComponent(`https://archive.org/wayback/available?url=${domain}&timestamp=${ts}`)}`;
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
      const data = await res.json();
      let parsed;
      if (data.contents) parsed = JSON.parse(data.contents);
      else parsed = data;
      if (parsed.archived_snapshots?.closest) { found.push(y); return true; }
    } catch(e) { console.warn(`Wayback failed for ${y}y:`, e.message); }
    return false;
  });
  await Promise.all(checks);
  if (found.includes(1)) historyBonus += 5;
  if (found.includes(2)) historyBonus += 5;
  if (found.includes(5)) historyBonus += 10;
  return { bonus: historyBonus, years: found };
}

// ----------------------------------------------------------------------
// 4. FETCH PAGINA (con fallback)
// ----------------------------------------------------------------------
async function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    return res;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

async function fetchPage(url) {
  try {
    const r = await fetchWithTimeout(`/api/fetch-page?url=${encodeURIComponent(url)}`, 12000);
    if (r.status === 422) {
      const j = await r.json().catch(()=>({}));
      console.warn('fetch-page: only redirect/trap pages found', j);
      window._fetchTrapped = true;
      return null;
    }
    if (r.ok) {
      const txt = await r.text();
      if (txt.length > 200) {
        console.log('Vercel API OK');
        window._fetchTrapped = false;
        return txt;
      }
    }
  } catch(e) { console.warn('Vercel API failed:', e.message); }
  // fallback
  try {
    const r = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, 5000);
    if (r.ok) {
      const j = await r.json();
      if (j?.contents?.length > 200) {
        console.log('allorigins OK');
        window._fetchTrapped = false;
        return j.contents;
      }
    }
  } catch(e) { console.warn('allorigins failed:', e.message); }
  try {
    const r = await fetchWithTimeout(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, 5000);
    if (r.ok) {
      const txt = await r.text();
      if (txt.length > 200) {
        console.log('codetabs OK');
        window._fetchTrapped = false;
        return txt;
      }
    }
  } catch(e) { console.warn('codetabs failed:', e.message); }
  console.warn('All fetch methods failed');
  return null;
}

// ----------------------------------------------------------------------
// 5. ESTRAZIONE SEGNALI (con rilevamento plugin corretto)
// ----------------------------------------------------------------------
function extractSignals(html, url) {
  const doc = (new DOMParser()).parseFromString(html, 'text/html');
  const content = (sel) => doc.querySelector(sel)?.getAttribute('content') || null;
  const hrefAttr = (sel) => doc.querySelector(sel)?.href || null;
  const jsonLdScripts = [...doc.querySelectorAll('script[type="application/ld+json"]')];
  const jsonLd = jsonLdScripts.map(s => { try { return JSON.parse(s.textContent); } catch(e) { return null; } }).filter(Boolean);
  const links = [...doc.querySelectorAll('a[href]')].map(a => a.href);
  const allObjects = jsonLd.flatMap(j => j['@graph'] || [j]);
  return {
    url, title: doc.title || null,
    description: content('meta[name="description"]'),
    canonical: hrefAttr('link[rel="canonical"]'),
    ogTitle: content('meta[property="og:title"]'),
    ogDescription: content('meta[property="og:description"]'),
    ogType: content('meta[property="og:type"]'),
    ogImage: content('meta[property="og:image"]'),
    author: content('meta[name="author"]'),
    jsonLd,
    jsonLdTypes: allObjects.map(o => o['@type']).filter(Boolean).flat(),
    hasPersonSchema: allObjects.some(o => ['Person', 'ProfilePage'].includes(o['@type'])),
    hasOrgSchema: allObjects.some(o => ['Organization', 'LocalBusiness', 'NGO', 'Association', 'EducationalOrganization'].includes(o['@type'])),
    sameAs: allObjects.flatMap(o => Array.isArray(o.sameAs) ? o.sameAs : (o.sameAs ? [o.sameAs] : [])),
    hasCustomDomain: (() => { try { return !/^(www\.)?(linkedin|facebook|instagram|twitter|x\.com|linktree|bio\.link|linktr\.ee)/i.test(new URL(url).hostname); } catch { return true; } })(),
    socials: {
      linkedin: links.find(h => /linkedin\.com\/(in|company)\//i.test(h)) || null,
      github: links.find(h => /github\.com\//i.test(h)) || null,
    },
    h1s: [...doc.querySelectorAll('h1')].map(h => h.textContent.trim()).filter(Boolean).slice(0,3),
    bodyExcerpt: (doc.body?.textContent || '').replace(/\s+/g, ' ').trim().substring(0,400),
    platform: detectPlatform(html, jsonLd),
    jsonLdQuality: analyzeJsonLdQuality(jsonLd, detectPlatform(html, jsonLd), html)
  };
}

function detectPlatform(html, jsonLd) {
  const raw = JSON.stringify(jsonLd);
  const head = (html || '').substring(0,8000);
  if (/cdn\.shopify\.com|shopify\.com\/s\//i.test(raw) || /Shopify\./i.test(head)) return 'shopify';
  if (/prestashop/i.test(head) || /"prestashop"/i.test(raw)) return 'prestashop';
  if (/woocommerce|woo-commerce/i.test(raw) || /woocommerce/i.test(head)) return 'woocommerce';
  if (raw.includes('wp-') || raw.includes('wordpress') || /\/wp-content\//i.test(head)) return 'wordpress';
  if (/squarespace\.com/i.test(raw) || /squarespace/i.test(head)) return 'squarespace';
  if (/wixsite\.com|static\.wixstatic/i.test(raw) || /wix-code/i.test(head)) return 'wix';
  return 'unknown';
}

function analyzeJsonLdQuality(jsonLd, platform = '', html = '') {
  if (!jsonLd || jsonLd.length === 0) return { present: false, source: 'nessuno', score: 'assente', details: [] };
  const raw = JSON.stringify(jsonLd);
  const fullHtml = (html || '').toLowerCase();
  const isYoast = raw.includes('#/schema/') || raw.includes('yoast') || fullHtml.includes('wpseo');
  const isRankMath = raw.includes('rank-math') || raw.includes('rankmath') || raw.includes('#richSnippet');
  const isWpAuto = (raw.includes('wp-') || raw.includes('wordpress')) && (fullHtml.includes('/wp-content/plugins/') || fullHtml.includes('wp-json/wp/v2'));
  const isPlugin = isYoast || isRankMath || isWpAuto;
  let source = 'manuale';
  let isPluginFlag = false;
  if (isYoast) { source = 'Yoast SEO (plugin)'; isPluginFlag = true; }
  else if (isRankMath) { source = 'RankMath (plugin)'; isPluginFlag = true; }
  else if (isWpAuto) { source = 'WordPress automatico (plugin)'; isPluginFlag = true; }
  else if (['shopify','prestashop','squarespace','wix'].includes(platform)) { source = `${platform} (nativo)`; isPluginFlag = true; }
  const allObjects = jsonLd.flatMap(j => j['@graph'] || [j]);
  const person = allObjects.find(o => o['@type'] === 'Person' || o['@type'] === 'ProfilePage');
  const org = allObjects.find(o => ['Organization','LocalBusiness','NGO','EducationalOrganization'].includes(o['@type']));
  const mainEntity = person || org;
  let richness = 0;
  const details = [];
  if (mainEntity) {
    const props = ['name','description','image','jobTitle','worksFor','knowsAbout','affiliation','memberOf','nationality','hasCredential','hasOccupation','homeLocation','vatID','contactPoint','publishingPrinciples','sameAs','alumniOf','award','subjectOf','url'];
    const present = props.filter(p => mainEntity[p]);
    richness = Math.round((present.length / props.length) * 100);
    details.push(`Proprietà compilate: ${present.join(', ') || 'nessuna'}`);
    const sameAs = Array.isArray(mainEntity.sameAs) ? mainEntity.sameAs : (mainEntity.sameAs ? [mainEntity.sameAs] : []);
    const hasWikidata = sameAs.some(s => /wikidata\.org/i.test(s));
    const hasWikipedia = sameAs.some(s => /wikipedia\.org/i.test(s));
    if (sameAs.length === 0) details.push('sameAs: ASSENTE');
    else details.push(`sameAs: ${sameAs.length} link (${[hasWikidata?'Wikidata':'', hasWikipedia?'Wikipedia':''].filter(Boolean).join(', ') || 'solo social'})`);
    if (!hasWikidata) details.push('Wikidata: MANCANTE');
  } else details.push('Nessun schema Person/Organization');
  if (isPluginFlag && !source.includes('manuale')) details.push(`ATTENZIONE: generato da ${source}`);
  return {
    present: true, source, isPlugin: isPluginFlag,
    types: allObjects.map(o => o['@type']).filter(Boolean).flat(),
    richness, details,
    sameAsCount: allObjects.flatMap(o => Array.isArray(o.sameAs) ? o.sameAs : (o.sameAs ? [o.sameAs] : [])).length,
    hasWikidata: JSON.stringify(allObjects).includes('wikidata.org'),
    hasWikipedia: JSON.stringify(allObjects).includes('wikipedia.org')
  };
}

// ----------------------------------------------------------------------
// 6. FETCH FILE AI (llms.txt, robots.txt, sitemap)
// ----------------------------------------------------------------------
async function fetchAiFiles(baseUrl) {
  const base = new URL(baseUrl).origin;
  const results = { llmsTxt: null, robotsTxt: null, sitemapXml: false, sitemapUrl: null, llmsTxtStatus: 'absent', robotsTxtStatus: 'absent', sitemapStatus: 'absent' };
  const isHtmlOrTrash = (t) => /^<(!doctype|html|!--|saved from)/i.test(t.substring(0,400).toLowerCase()) || /<html[\s>]/i.test(t.substring(0,200));
  const isXmlSitemap = (t) => /<urlset|<sitemapindex/i.test(t.substring(0,600));
  async function tryFetch(pathOrUrl) {
    const fullUrl = pathOrUrl.startsWith('http') ? pathOrUrl : base + pathOrUrl;
    try {
      const r = await fetchWithTimeout(`/api/fetch-page?raw=1&url=${encodeURIComponent(fullUrl)}`, 8000);
      if (r.ok) {
        const txt = await r.text();
        return { content: txt, status: 'found' };
      }
      return { content: null, status: r.status === 404 ? 'absent' : 'unreachable' };
    } catch { return { content: null, status: 'unreachable' }; }
  }
  const rb = await tryFetch('/robots.txt');
  if (rb.status === 'found' && rb.content && !isHtmlOrTrash(rb.content)) {
    results.robotsTxt = rb.content.substring(0,1200);
    results.robotsTxtStatus = 'found';
  } else results.robotsTxtStatus = rb.status;
  const ll = await tryFetch('/llms.txt');
  if (ll.status === 'found' && ll.content && !isHtmlOrTrash(ll.content) && ll.content.trim().length > 5) {
    results.llmsTxt = ll.content.substring(0,800);
    results.llmsTxtStatus = 'found';
  } else results.llmsTxtStatus = ll.status;
  let sitemapPaths = ['/sitemap.xml','/sitemap_index.xml','/wp-sitemap.xml','/sitemap-index.xml','/page-sitemap.xml'];
  if (results.robotsTxt) {
    const match = results.robotsTxt.match(/^Sitemap:\s*(.+)$/im);
    if (match) sitemapPaths.unshift(match[1].trim());
  }
  let sitemapAllUnreachable = true;
  for (const path of sitemapPaths) {
    if (results.sitemapXml) break;
    const sm = await tryFetch(path);
    if (sm.status === 'found' && sm.content && isXmlSitemap(sm.content)) {
      results.sitemapXml = true;
      results.sitemapUrl = path.startsWith('http') ? path : base + path;
      results.sitemapStatus = 'found';
      sitemapAllUnreachable = false;
      break;
    }
    if (sm.status === 'absent') sitemapAllUnreachable = false;
  }
  if (!results.sitemapXml && sitemapAllUnreachable) results.sitemapStatus = 'unreachable';
  return results;
}

// ----------------------------------------------------------------------
// 7. CALCOLO PUNTEGGI (bilanciato, nessun falso plugin penalty)
// ----------------------------------------------------------------------
function computeScores(signals, aiFiles, history, html) {
  if (!signals) return { leggibilita:20, grafo:20, coerenza:20, politica:20, profilo:20, overall:20 };
  const allObjects = signals.jsonLd.flatMap(j => j['@graph'] || [j]);
  const mainEntity = allObjects.find(o => o['@type'] === 'Person' || o['@type'] === 'ProfilePage');
  const isManual = signals.jsonLdQuality && !signals.jsonLdQuality.isPlugin;
  const hasGraph = JSON.stringify(signals.jsonLd).includes('"@graph"');
  // 1. Leggibilità
  let l = 0;
  if (signals.jsonLd.length > 0) {
    l += 30;
    l += isManual ? 25 : 10;
    if (hasGraph && isManual) l += 10;
  }
  if (signals.title) l += 8;
  if (signals.description && signals.description.length > 50) l += 7;
  if (signals.canonical) l += 5;
  if (signals.ogTitle && signals.ogDescription) l += 5;
  if (signals.h1s && signals.h1s.length > 0) l += 5;
  if (html && /<(main|article|header|footer|section)/i.test(html)) l += 5;
  if (aiFiles?.llmsTxt) l += 10;
  if (aiFiles?.robotsTxt && /Allow|Disallow/i.test(aiFiles.robotsTxt)) l += 10;
  l = Math.min(100, l);
  // 2. Autorità
  let g = 0;
  if (mainEntity) {
    const sameAs = Array.isArray(mainEntity.sameAs) ? mainEntity.sameAs : (mainEntity.sameAs ? [mainEntity.sameAs] : []);
    let kg = 0;
    for (const link of sameAs) {
      if (/wikidata\.org/i.test(link)) kg += 22;
      else if (/wikipedia\.org/i.test(link)) kg += 12;
      else if (/linkedin\.com/i.test(link)) kg += 8;
      else if (/github\.com/i.test(link)) kg += 6;
      else if (/orcid\.org/i.test(link)) kg += 9;
      else kg += 1;
    }
    g += Math.min(35, kg);
    const knows = mainEntity.knowsAbout;
    if (knows) {
      const count = Array.isArray(knows) ? knows.length : 1;
      g += Math.min(20, count * 6);
    }
    if (mainEntity.worksFor || mainEntity.affiliation) g += 15;
    if (mainEntity.memberOf) g += 5;
    if (mainEntity.subjectOf) g += 12;
    if (mainEntity.identifier) g += 10;
    if (mainEntity.vatID) g += 3;
  }
  g = Math.min(100, g);
  // 3. Coerenza
  let c = 0;
  if (signals.title && mainEntity?.name) {
    if (signals.title === mainEntity.name || signals.title.includes(mainEntity.name) || mainEntity.name.includes(signals.title)) c += 20;
    else c += 10;
  } else if (signals.title) c += 5;
  if (signals.description && mainEntity?.description) {
    if (signals.description === mainEntity.description || signals.description.includes(mainEntity.description)) c += 15;
    else c += 5;
  }
  if (signals.ogImage && mainEntity?.image && new URL(signals.ogImage).origin === new URL(mainEntity.image).origin) c += 10;
  if (signals.canonical && signals.url && (signals.canonical === signals.url || new URL(signals.canonical).pathname === new URL(signals.url).pathname)) c += 10;
  const hasPersonId = allObjects.some(o => o['@type'] === 'Person' && o['@id']);
  const hasOrgId = allObjects.some(o => (o['@type'] === 'Organization' || o['@type'] === 'EducationalOrganization') && o['@id']);
  if (hasPersonId && hasOrgId) c += 15;
  else if (hasPersonId || hasOrgId) c += 8;
  if (mainEntity && (mainEntity.sameAs?.length || 0) >= 2) c += 10;
  c += history.bonus;
  c = Math.min(100, c);
  // 4. Accessibilità AI
  let p = 0;
  if (aiFiles?.llmsTxt) p += 50;
  if (aiFiles?.robotsTxt && /gptbot|claudebot|google-extended|perplexity/i.test(aiFiles.robotsTxt)) p += 35;
  else if (aiFiles?.robotsTxt) p += 20;
  if (aiFiles?.sitemapXml) p += 15;
  p = Math.min(100, p);
  // 5. Profilo
  let pr = 0;
  if (mainEntity) {
    if (mainEntity.name) pr += 6;
    if (mainEntity.description && mainEntity.description.length > 50) pr += 5;
    if (mainEntity.image) pr += 4;
    if (mainEntity.jobTitle) pr += 10;
    if (mainEntity.worksFor || mainEntity.affiliation) pr += 12;
    const knows = mainEntity.knowsAbout;
    if (knows) {
      const count = Array.isArray(knows) ? knows.length : 1;
      pr += Math.min(28, count * 7);
    }
    if (mainEntity.hasCredential) pr += 6;
    const awards = mainEntity.award;
    if (awards) {
      const awardCount = Array.isArray(awards) ? awards.length : 1;
      pr += Math.min(10, awardCount * 4);
    }
    const sameAs = Array.isArray(mainEntity.sameAs) ? mainEntity.sameAs : (mainEntity.sameAs ? [mainEntity.sameAs] : []);
    let profPoints = 0;
    for (const link of sameAs) {
      if (/linkedin\.com/i.test(link)) profPoints += 8;
      else if (/github\.com/i.test(link)) profPoints += 6;
      else if (/orcid\.org/i.test(link)) profPoints += 9;
      else if (/researchgate\.net/i.test(link)) profPoints += 6;
      else if (/twitter\.com|x\.com/i.test(link)) profPoints += 2;
      else profPoints += 1;
    }
    pr += Math.min(18, profPoints);
    if (mainEntity.identifier) {
      const ids = Array.isArray(mainEntity.identifier) ? mainEntity.identifier : [mainEntity.identifier];
      if (ids.some(id => typeof id === 'string' && (id.includes('orcid') || id.includes('wikidata') || /Q\d+/.test(id)))) pr += 8;
      else pr += 3;
    }
    if (mainEntity.vatID) pr += 3;
    if (mainEntity.alumniOf) pr += 4;
    if (mainEntity.memberOf) pr += 3;
  }
  pr = Math.min(100, Math.round(pr));
  const scores = { leggibilita:l, grafo:g, coerenza:c, politica:p, profilo:pr };
  scores.overall = Math.round(l*0.30 + g*0.25 + c*0.20 + p*0.15 + pr*0.10);
  return scores;
}

function normalizeUrl(raw) {
  raw = raw.trim().replace(/\s+/g, '');
  if (!raw) return null;
  if (/^@/.test(raw)) raw = raw.substring(1);
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  try { new URL(raw); return raw; } catch { return null; }
}

      Dimensioni: 1.Leggibilità AI 2.Autorità Digitale 3.Coerenza Identità 4.Accessibilità AI 5.Profilo.

  ) + `\nREQUIRED DETAIL LEVEL: ${TONE}/5 — ${t('toneLevels')[TONE-1]}\n${toneDescriptions[TONE]}\n`;

    : `Analizza entità (pagina non accessibile): ${url}\n${scoresInfo}\n${aiFilesInfo}`;
  
  const geminiBody = JSON.stringify({
    system_instruction: { parts: [{ text: sysPrompt }] },

    generationConfig: { maxOutputTokens: 2048, temperature: 0.3 }
  });
  
  try {
    const res = await fetch('/api/gemini-analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:geminiBody });
    const rawText = await res.text();
    if (!res.ok) throw new Error(`${t('errApi')} ${res.status}`);
    const data = JSON.parse(rawText);
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const txt = parts.filter(p => !p.thought).map(p => p.text).join('');
    const clean = txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const start = clean.indexOf('{'), end = clean.lastIndexOf('}');
    if (start===-1 || end===-1) throw new Error(t('errNoJson'));
    const parsed = JSON.parse(clean.substring(start,end+1));
    renderResults(parsed, signals, aiFiles, scores);
  } catch(err) {
    document.getElementById('loadingSection').style.display = 'none';
    document.getElementById('inputSection').style.opacity = '1';
    document.getElementById('btnAnalyze').disabled = false;
    showErr('Errore: '+err.message);
  }
}

// ----------------------------------------------------------------------
// 9. RENDER RISULTATI (con giudizi testuali e fallback)
// ----------------------------------------------------------------------
function sc(s) { return s>=65?'#2DB885':s>=40?'#D4870E':'#D84F35'; }
function scoreToRating(score) {
  if (score>=80) return { label:(LANG==='en'?'Excellent':'Eccellente'), color:'#2DB885' };
  if (score>=60) return { label:(LANG==='en'?'Good':'Buono'), color:'#A9C94C' };
  if (score>=40) return { label:(LANG==='en'?'Sufficient':'Sufficiente'), color:'#D4870E' };
  return { label:(LANG==='en'?'Poor':'Scarso'), color:'#D84F35' };
}

function renderResults(d, signals, aiFiles, scores) {
  d.score = scores.overall;
  const scoreMap = { leggibilita:scores.leggibilita, grafo:scores.grafo, coerenza:scores.coerenza, politica:scores.politica, profilo:scores.profilo };
  if (!d.dimensioni || !Array.isArray(d.dimensioni)) {
    d.dimensioni = [
      {id:'leggibilita', nome:(LANG==='en'?'AI Readability':'Leggibilità AI'), sintesi:'', gap:'', score:scores.leggibilita},
      {id:'grafo', nome:(LANG==='en'?'Digital Authority':'Autorità Digitale'), sintesi:'', gap:'', score:scores.grafo},
      {id:'coerenza', nome:(LANG==='en'?'Identity Consistency':'Coerenza Identità'), sintesi:'', gap:'', score:scores.coerenza},
      {id:'politica', nome:(LANG==='en'?'AI Accessibility':'Accessibilità AI'), sintesi:'', gap:'', score:scores.politica},
      {id:'profilo', nome:(LANG==='en'?'Profile & Expertise':'Profilo e Competenze'), sintesi:'', gap:'', score:scores.profilo}
    ];
  } else {
    d.dimensioni.forEach(dim => { if (scoreMap[dim.id]!==undefined) dim.score = scoreMap[dim.id]; });
  }
  document.getElementById('loadingSection').style.display = 'none';
  document.getElementById('inputSection').style.display = 'none';
  const R=40, circ=(2*Math.PI*R).toFixed(2), off=(circ-(d.score/100)*circ).toFixed(2), color=sc(d.score);
  const ratingTotal = scoreToRating(d.score);
  document.getElementById('scoreHeroWrap').innerHTML = `
    <div class="score-hero">
      <div class="ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${R}" fill="none" stroke="#1C1C30" stroke-width="6"/>
          <circle cx="50" cy="50" r="${R}" fill="none" stroke="${color}" stroke-width="6" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="round" id="scoreRing"/>
        </svg>
        <div class="ring-center">
          <span class="ring-num" id="scoreNum" style="color:${color}">0</span>
          <span class="ring-sub">/100</span>
          <div style="font-size:.45rem;color:${ratingTotal.color};margin-top:4px;">${ratingTotal.label}</div>
        </div>
      </div>
      <div class="hero-info">
        <span class="tipo">${d.tipo || (LANG==='en'?'Entity':'Entità')}</span>
        <h2>${d.nome || ''}</h2>
        <p class="sintesi">${d.sintesi || ''}</p>
      </div>
    </div>`;
  if (d.percezione_ai) {
    if (!document.getElementById('percezioneBox')) {
      document.getElementById('scoreHeroWrap').insertAdjacentHTML('afterend', `
        <div id="percezioneBox" style="background:var(--surface);border:1px solid var(--border);padding:1.25rem 1.5rem;margin-bottom:1rem">
          <div style="font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem">${LANG==='en'?'How an AI perceives me':'Come mi percepisce un sistema AI'}</div>
          <p style="font-size:.78rem;color:var(--muted);line-height:1.8;margin:0;font-style:italic">"${d.percezione_ai}"</p>
        </div>`);
    }
  }
  if (signals || aiFiles) {
    const jq = signals?.jsonLdQuality;
    const tags = [
      {l: signals?.jsonLd?.length > 0 ? (jq?.isPlugin ? `⚠️ Plugin (${(jq.source||'').split(' ')[0]})` : '✅ Schema manuale') : 'JSON-LD assente', v: signals?.jsonLd?.length > 0, warn: jq?.isPlugin},
      {l: 'sameAs', v: (signals?.sameAs?.length||0) > 0},
      {l: 'Wikidata', v: jq?.hasWikidata || false},
      {l: 'Wikipedia', v: jq?.hasWikipedia || false},
      {l: 'llms.txt', v: !!aiFiles?.llmsTxt},
      {l: 'robots.txt', v: !!aiFiles?.robotsTxt},
      {l: aiFiles?.sitemapUrl ? `sitemap` : 'sitemap', v: !!aiFiles?.sitemapXml}
    ];
    document.getElementById('dataBar').innerHTML = `<div class="data-bar">${tags.map(t => `<span class="dtag ${t.warn?'warn':t.v?'yes':'no'}">${t.warn?'⚠':t.v?'✓':'✗'} ${t.l}</span>`).join('')}</div>`;
  }
  document.getElementById('dimsGrid').innerHTML = d.dimensioni.map(dim => {
    const rating = scoreToRating(dim.score);
    return `<div class="dim-card">
      <div class="dim-top">
        <div class="dim-name">${dim.nome}</div>
        <div style="text-align:right">
          <div class="dim-score-n" style="color:${sc(dim.score)}">${dim.score}</div>
          <div style="font-size:.6rem;color:${rating.color}">${rating.label}</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" data-w="${dim.score}" style="background:${sc(dim.score)}"></div></div>
      <div class="dim-sintesi">${dim.sintesi || ''}</div>
      ${dim.gap && dim.gap!=='undefined' ? `<div class="dim-gap">${dim.gap}</div>` : ''}
    </div>`;
  }).join('');
  let passi = (d.passi || []).filter(p => p && typeof p==='object' && p.a);
  if (passi.length === 0 && d.lacune && d.lacune.length) passi = [{p:'media',a:'Verifica la configurazione dell\'array "passi" nel JSON restituito.'}];
  document.getElementById('bottomGrid').innerHTML = `
    <div class="bottom-card"><div class="bottom-title" style="color:#2DB885">${LANG==='en'?'Strengths':'Punti di forza'}</div>${(d.forze||[]).map(f=>`<div class="b-item"><span class="b-icon" style="color:#2DB885">◆</span>${f}</div>`).join('')}</div>
    <div class="bottom-card"><div class="bottom-title" style="color:#D84F35">${LANG==='en'?'Critical gaps':'Lacune critiche'}</div>${(d.lacune||[]).map(l=>`<div class="b-item"><span class="b-icon" style="color:#D84F35">◆</span>${l}</div>`).join('')}</div>
    <div class="bottom-card"><div class="bottom-title" style="color:#D4870E">${LANG==='en'?'Next steps':'Prossimi passi'}</div>${passi.map(p=>`<div class="step-item"><div class="step-p" style="color:${p.p==='alta'||p.p==='high'?'#D84F35':p.p==='media'||p.p==='medium'?'#D4870E':'#8080A0'}">↑ ${p.p}</div><div class="step-a">${p.a}</div></div>`).join('')}</div>`;
  document.getElementById('resultsSection').style.display = 'block';
  requestAnimationFrame(()=>setTimeout(()=>{
    const ring = document.getElementById('scoreRing');
    if (ring) ring.style.strokeDashoffset = off;
    let c=0, total=d.score;
    const iv = setInterval(()=>{ c=Math.min(c+1,total); const el=document.getElementById('scoreNum'); if(el) el.textContent=c; if(c>=total) clearInterval(iv); }, 1500/total);
    document.querySelectorAll('.bar-fill').forEach(b=>{ b.style.width = b.dataset.w+'%'; });
  },60));
}

function downloadPdf() {
  const url = document.getElementById('urlInput')?.value || 'report';
  const domain = url.replace(/https?:\/\//,'').replace(/\/.*/,'').replace(/[^a-z0-9.-]/gi,'_');
  document.title = 'AI Readiness — '+domain;
  window.print();
  setTimeout(()=>{ document.title = (LANG==='en'?'Who are you in the AI era?':"Chi sei nell'era dell'AI?"); },1000);
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderLang();
  document.getElementById('urlInput').addEventListener('keydown', e=>{ if(e.key==='Enter') runAnalysis(); });
});
</script>
</body>
</html>
